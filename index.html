<!doctype html>
<html lang="ko">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>차시 목록</title>
	<style>
		:root {
			--max: 900px;
		}

		body {
			margin: 0;
			font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
		}

		header {
			background: #111;
			color: #fff;
			padding: 24px 16px;
		}

		header h1 {
			margin: 0;
			font-size: 20px;
			font-weight: 700;
		}

		main {
			max-width: var(--max);
			margin: 16px auto;
			padding: 0 16px;
		}

		ol {
			list-style: decimal;
			padding: 0;
			margin: 0;
			display: block;
			grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
			gap: 12px;
		}

		li a {
			display: block;
			padding: 14px 16px;
			border: 1px solid #e5e7eb;
			border-radius: 12px;
			text-decoration: none;
			color: #111;
			background: #fff;
		}

		li a:hover {
			border-color: #93c5fd;
			box-shadow: 0 1px 0 rgba(0, 0, 0, .03);
		}

		.title {
			font-weight: 700;
			margin-bottom: 4px;
		}

		.desc {
			color: #6b7280;
			font-size: 14px;
		}
	</style>
	<!-- Load config & data first -->
	<script src="./data/config.js" defer></script>
	<script src="./data/data.js" defer></script>
</head>

<body>
	<header>
		<h1 id="site-title"></h1>
	</header>
	<main>
		<ol id="chapter-list"></ol>
	</main>


	<script>
		// Utilities
		const to2 = (n) => String(n).padStart(2, '0');
		function toArrayLike(objOrArray) {
			if (Array.isArray(objOrArray)) return objOrArray;
			if (objOrArray && typeof objOrArray === 'object') {
				return Object.keys(objOrArray).sort((a, b) => +a - +b).map(k => objOrArray[k]);
			}
			return [];
		}


		window.addEventListener('DOMContentLoaded', () => {
			const title = (window.config && window.config.title) || '학습 콘텐츠';
			document.getElementById('site-title').textContent = title;


			const chapters = toArrayLike(window.content_data);
			const list = document.getElementById('chapter-list');


			chapters.forEach((ch, idx) => {
				const li = document.createElement('li');
				const a = document.createElement('a');
				a.href = `./${to2(idx + 1)}/01.html`;
				const t = document.createElement('div'); t.className = 'title'; t.textContent = ch.title || `제 ${idx + 1}차시`;
				const d = document.createElement('div'); d.className = 'desc'; d.textContent = (ch.subtitle || ch.description || '').toString().slice(0, 120);
				a.appendChild(t); a.appendChild(d); li.appendChild(a); list.appendChild(li);
			});
		});
	</script>
</body>

</html>
