<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>차시 강의</title>
  <link href="../../common/lib/video-js.css" rel="stylesheet">
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
    .navigation { margin-top: 20px; }
    .navigation button { margin: 0 10px; padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h2 id="lecture-title">차시 강의</h2>
  <video id="lecture-video" class="video-js vjs-default-skin" width="640" height="360" controls preload="auto">
    <!-- JS에서 src 설정 -->
  </video>

  <div class="navigation">
    <button id="prevBtn">이전</button>
    <button id="nextBtn">다음</button>
  </div>

  <script src="../../common/lib/video.min.js"></script>
  <script>
    const currentFile = location.pathname.split('/').pop(); // 예: "01.html"
    const pageNum = currentFile.split('.')[0]; // "01"
    
    // 동영상 경로 설정
    const videoEl = document.getElementById('lecture-video');
    const sourceEl = document.createElement('source');
    sourceEl.src = `../content/01/${pageNum}.mp4`;
    sourceEl.type = "video/mp4";
    videoEl.appendChild(sourceEl);

    // 제목 업데이트
    document.getElementById('lecture-title').innerText = `${pageNum}차시 강의`;

    // 이전/다음 버튼 기능
    document.getElementById('prevBtn').onclick = () => {
      const prev = String(parseInt(pageNum) - 1).padStart(2, '0');
      location.href = `${prev}.html`;
    };
    document.getElementById('nextBtn').onclick = () => {
      const next = String(parseInt(pageNum) + 1).padStart(2, '0');
      location.href = `${next}.html`;
    };
  </script>
</body>
</html>
