<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>역량진단 평가</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      background-color: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .wrapper {
      width: 1024px;
      height: 600px;
      background: #fff;
      border: 1px solid #ccc;
      padding: 20px 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      position: relative;
      overflow-y: auto;
    }

    .wrapper.noscroll {     /* 스크롤 잠금 클래스, 시작 화면에서 씀*/
      overflow: hidden;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .page {
      display: none;
    }

    .visible {
      display: block;
    }

    .question-card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      background-color: #fefefe;
    }

    .question-title {
      margin-bottom: 10px;
      font-weight: bold;
    }

    .options label {
      display: inline-block;
      margin-right: 20px;
      cursor: pointer;
    }

    .btn-group {
      text-align: center;
      margin-top: 30px;
    }

    button {
      padding: 10px 25px;
      font-size: 16px;
      border: none;
      background-color: #3b82f6;
      color: #fff;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #2563eb;
    }

    .card-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      flex: 1;
      border: 1px solid #ddd;
      padding: 15px;
      text-align: center;
      border-radius: 8px;
    }

    .highlight {
      border: 2px solid #333;
      background-color: #eef;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: #2563eb;
    }

    a:hover {
      text-decoration: underline;
    }

    #start-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #fff;
      z-index: 10;
      flex-direction: column;
    }

    #start-screen button.start-btn {
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 25px;
      border: 2px solid black;
      background: white;
      cursor: pointer;
      color: black;
    }

    #start-screen .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      background: none;
      border: none;
      cursor: pointer;
      color: black;
    }

    .result-close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      background: none;
      border: none;
      cursor: pointer;
      color: black;
    }
  </style>
</head>
<body>
  
  <div class="wrapper noscroll">

    <!-- 시작 화면 -->
    <div id="start-screen" class="visible">
      <button class="close-btn" onclick="goToExit()">×</button>
      <button class="start-btn" onclick="startSurvey()">역량진단 바로가기</button>
    </div>

    <h1>역량진단 평가</h1>

      <!-- 페이지 1 -->
<div id="page1" class="page visible">
  <div class="question-card">
    <div class="question-title">1. 역량진단 평가입니다</div>
    <div class="options">
      <label><input type="radio" name="q1" value="5"> 매우 그렇다</label>
      <label><input type="radio" name="q1" value="4"> 다소 그런 편이다</label>
      <label><input type="radio" name="q1" value="3"> 보통이다</label>
      <label><input type="radio" name="q1" value="2"> 그렇지 않은 편이다</label>
      <label><input type="radio" name="q1" value="1"> 전혀 그렇지 않다</label>
    </div>
  </div>
  <div class="question-card">
    <div class="question-title">2. 역량진단 평가입니다</div>
    <div class="options">

      <label><input type="radio" name="q2" value="2"> 그렇지 않은 편이다</label>
      <label><input type="radio" name="q2" value="1"> 전혀 그렇지 않다</label>
    </div>
  </div>

  <div class="question-card">
    <div class="question-title">3. 역량진단 평가입니다</div>
    <div class="options">
      <label><input type="radio" name="q3" value="5"> 매우 그렇다</label>
      <label><input type="radio" name="q3" value="4"> 다소 그런 편이다</label>
      <label><input type="radio" name="q3" value="3"> 보통이다</label>
      <label><input type="radio" name="q3" value="2"> 그렇지 않은 편이다</label>
      <label><input type="radio" name="q3" value="1"> 전혀 그렇지 않다</label>
    </div>
  </div>

  <div class="question-card">
    <div class="question-title">4. 역량진단 평가입니다</div>
    <div class="options">
      <label><input type="radio" name="q4" value="5"> 매우 그렇다</label>
      <label><input type="radio" name="q4" value="4"> 다소 그런 편이다</label>
      <label><input type="radio" name="q4" value="3"> 보통이다</label>
      <label><input type="radio" name="q4" value="2"> 그렇지 않은 편이다</label>
      <label><input type="radio" name="q4" value="1"> 전혀 그렇지 않다</label>
    </div>
  </div>

  <div class="question-card">
    <div class="question-title">5. 역량진단 평가입니다</div>
    <div class="options">
      <label><input type="radio" name="q5" value="5"> 매우 그렇다</label>
      <label><input type="radio" name="q5" value="4"> 다소 그런 편이다</label>
      <label><input type="radio" name="q5" value="3"> 보통이다</label>
      <label><input type="radio" name="q5" value="2"> 그렇지 않은 편이다</label>
      <label><input type="radio" name="q5" value="1"> 전혀 그렇지 않다</label>
    </div>
  </div>

  <div class="btn-group">
    <button type="button" onclick="goToPage2()">다음</button>
  </div>
</div>

<!-- 페이지 2 -->
<div id="page2" class="page">
  <div class="question-card">
    <div class="question-title">6. 역량진단 평가입니다</div>
    <div class="options">
      <label><input type="radio" name="q6" value="5"> 매우 그렇다</label>
      <label><input type="radio" name="q6" value="4"> 다소 그런 편이다</label>
      <label><input type="radio" name="q6" value="3"> 보통이다</label>
      <label><input type="radio" name="q6" value="2"> 그렇지 않은 편이다</label>
      <label><input type="radio" name="q6" value="1"> 전혀 그렇지 않다</label>
    </div>
  </div>

  <div class="question-card">
    <div class="question-title">7. 역량진단 평가입니다</div>
    <div class="options">
      <label><input type="radio" name="q7" value="5"> 매우 그렇다</label>
      <label><input type="radio" name="q7" value="4"> 다소 그런 편이다</label>
      <label><input type="radio" name="q7" value="3"> 보통이다</label>

      <label><input type="radio" name="q7" value="1"> 전혀 그렇지 않다</label>

  </div>

  <div class="question-card">
    <div class="question-title">8. 역량진단 평가입니다</div>
    <div class="options">
      <label><input type="radio" name="q8" value="5"> 매우 그렇다</label>
      <label><input type="radio" name="q8" value="4"> 다소 그런 편이다</label>
      <label><input type="radio" name="q8" value="3"> 보통이다</label>
      <label><input type="radio" name="q8" value="2"> 그렇지 않은 편이다</label>
      <label><input type="radio" name="q8" value="1"> 전혀 그렇지 않다</label>
    </div>
  </div>

  <div class="question-card">
    <div class="question-title">9. 역량진단 평가입니다</div>
    <div class="options">
      <label><input type="radio" name="q9" value="5"> 매우 그렇다</label>
      <label><input type="radio" name="q9" value="4"> 다소 그런 편이다</label>
      <label><input type="radio" name="q9" value="3"> 보통이다</label>

    </div>
  </div>

  <div class="question-card">
    <div class="question-title">10. 역량진단 평가입니다</div>
    <div class="options">
      <label><input type="radio" name="q10" value="5"> 매우 그렇다</label>
      <label><input type="radio" name="q10" value="4"> 다소 그런 편이다</label>
      <label><input type="radio" name="q10" value="3"> 보통이다</label>
      <label><input type="radio" name="q10" value="2"> 그렇지 않은 편이다</label>
      <label><input type="radio" name="q10" value="1"> 전혀 그렇지 않다</label>
    </div>
  </div>

      <div class="btn-group">
        <button type="button" onclick="calculateResult()">결과 보기</button>
      </div>
    </div>

    <div id="result" style="margin-top: 20px; position: relative;"></div>
  </div>


  <script>
    function startSurvey() {
      document.getElementById("start-screen").style.display = "none";
      document.getElementById("page1").classList.add("visible");

      // 스크롤 잠금 해제 추가(시작화면에서 잠궜다가 설문 화면에서 풂)
      document.querySelector(".wrapper").classList.remove("noscroll");
    }

    function goToExit() {
      window.location.href = "01.html";
    }

    function goToPage2() {
      for (let i = 1; i <= 5; i++) {
        if (!document.querySelector(`input[name="q${i}"]:checked`)) {
          alert(`${i}번 질문에 응답해주세요.`);
          return;
        }
      }
      document.getElementById('page1').classList.remove('visible');
      document.getElementById('page2').classList.add('visible');
    }

    function calculateResult() {
      let total = 0;
      for (let i = 1; i <= 10; i++) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (!selected) {
          alert(`${i}번 질문에 응답해주세요.`);
          return;
        }
        total += Number(selected.value);
      }

      const avg = total / 10;
      let level = "";
      if (avg < 3) {
        level = "초급자";
      } else if (avg <= 4) {
        level = "중급자";
      } else {
        level = "고급자";
      }

      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = `
        <button class="result-close-btn" onclick="goToExit()">×</button>
        <div style="margin-top: 20px;">
          <h2>직무역량진단 결과</h2>
          <p>당신의 역량은 <strong>${level}</strong> 입니다. (평균: ${avg.toFixed(2)}점)</p>
          <p>나의 역량진단에 따라 보충 자료를 학습하세요.</p>

          <div class="card-container">
            <div class="card ${level === '초급자' ? 'highlight' : ''}">
              <h3>초급자</h3>
              <p>평균 3점 미만</p>
              <a href="content/1.pdf" download target="_black">보충자료 다운로드</a>
            </div>
            <div class="card ${level === '중급자' ? 'highlight' : ''}">
              <h3>중급자</h3>
              <p>평균 3~4점</p>
              <a href="content/2.pdf" download target="_black">보충자료 다운로드</a>
            </div>
            <div class="card ${level === '고급자' ? 'highlight' : ''}">
              <h3>고급자</h3>
              <p>평균 4점 초과</p>
              <a href="content/3.pdf" download target="_black">보충자료 다운로드</a>
            </div>
          </div>
        </div>
      `;

      document.getElementById('page2').classList.remove('visible');
    }
  </script>
</body>
</html>
