<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>역량진단 평가</title>
  <link rel="stylesheet" href="../common/css/lecture_comp.css">
  <link rel="stylesheet" href="../common/css/font.css">
</head>
<body>
  <div class="wrapper noscroll">
    <div id="start-screen" class="visible">
      <button class="close-btn" onclick="goToExit()"></button>
      <div class="start-content">
        <p>
          본 과정 시작 전 진행되는 사전 진단은<br>
          학습자의 직무역량 수준을 확인하고<br>
          개인별 맞춤형 보완학습을 제공하기 위한 절차입니다.
        </p>
        <p class="sub-text">
          사전 역량평가는 총 30문항으로 구성되며,<br>
          그 결과에 따라 학습자를 초급·중급·고급 수준으로 구분하고,<br>
          각 수준에 적합한 보완학습 자료를 안내하여 효과적인 학습을 지원합니다.
        </p>
        <button class="start-btn" onclick="startSurvey()"></button>
      </div>
    </div>
    <div id="result" class="page"></div>

  </div>
  
  <script src="../common/js/lecture_comp.js"></script>
</body>
</html>
