<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <script src="../data/config.js"></script>
  <title>차시 강의</title>
  <link href="../common/lib/video-js/video-js.css" rel="stylesheet" />
  <style>
    :root {
    --height_: 600px;
    --height_30: 570px;
    }
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    .video-js {
      width: 1024px;
      height: var(--height_);
    }
    #video-wrapper {
      position: relative;
      display: inline-block;
    }
    #quiz-container {
      display: none;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1024px;
      height: var(--height_30);
      padding-bottom: 30px;
      box-sizing: border-box;
      color: white;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 10;
      pointer-events: auto;
    }
    #quiz-container.active {
      display: block;
    }
    .quiz-question {
      font-size: 20px;
      margin-top: 100px;
      pointer-events: auto;
    }
    .quiz-buttons button {
      font-size: 18px;
      padding: 10px 30px;
      margin: 20px;
      pointer-events: auto;
    }
    #quiz-feedback {
      font-size: 18px;
      margin-top: 20px;
      pointer-events: auto;
    }
    .vjs-custom-control {
      font-size: 14px;
      color: white;
      padding: 0 5px;
      cursor: pointer;
      position: relative;
    }
    .dropdown-menu {
      display: none;
      position: absolute;
      min-width: 140px;
      bottom: 40px;
      left: 0;
      background: rgba(0, 0, 0, 0.2);
      color: white;
      font-size: 13px;
      padding: 5px 0;
      border-radius: 4px;
      z-index: 9999;
      max-height: 180px;
      overflow-y: auto;
    }
    .dropdown-menu div {
      padding: 5px 15px;
      cursor: pointer;
      text-align: left;
    }
    .dropdown-menu div:hover {
      background: rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <div id="video-wrapper">
    <video id="lecture-video"
           class="video-js vjs-default-skin"
           controls
           preload="auto">
      <source id="video-source" src="" type="video/mp4">
    </video>

    <div id="quiz-container">
      <div id="quiz-start" style="margin-top: 200px;">
        <button onclick="startQuiz()" style="font-size: 20px; padding: 15px 40px;">문제 시작</button>
      </div>
      <!-- 실제 퀴즈 UI는 처음엔 숨김 -->
      <div class="quiz-question" id="quiz-question" style="display: none;"></div>
      <div class="quiz-buttons" style="display: none;">
        <button onclick="answer('O')">O</button>
        <button onclick="answer('X')">X</button>
      </div>
      <div id="quiz-feedback" style="display: none;"></div>
    </div>

  <script src="../common/lib/video-js/video.min.js"></script>
  <script>
    const currentFile = location.pathname.split('/').pop();
    const pageNum = parseInt(currentFile.split('.')[0]);
    const paddedNum = String(pageNum).padStart(2, '0');
    const maxPage = 6;

    const sourceEl = document.getElementById('video-source');
    sourceEl.src = `../content/01/${paddedNum}.mp4`;

    const player = videojs('lecture-video', {
      controlBar: {
        fullscreenToggle: false  // ← 전체화면 버튼 제거
      }
    });
    player.ready(() => {
      player.src({ type: 'video/mp4', src: sourceEl.src });
      player.volume(0.5);
    });

    const quizData = [
      { q: "Q1. OX 퀴즈 첫 번째 문제입니다.", answer: "O" },
      { q: "Q2. 두 번째 문제입니다.", answer: "O" },
      { q: "Q3. 마지막 문제입니다.", answer: "O" }
    ];
    let currentQuiz = 0;
    let correctCount = 0;

    function startQuiz() {
      document.getElementById('quiz-start').style.display = "none";
      document.getElementById('quiz-question').style.display = "block";
      document.querySelector('.quiz-buttons').style.display = "block";
      loadQuiz();
    }
    
    function showQuizStartButton() {
      const container = document.getElementById('quiz-container');
      container.classList.add('active');
      document.getElementById('quiz-start').style.display = "block";
      document.getElementById('quiz-question').style.display = "none";
      document.querySelector('.quiz-buttons').style.display = "none";
      document.getElementById('quiz-feedback').style.display = "none";
    }

    function loadQuiz() {
      const questionEl = document.getElementById('quiz-question');
      const feedbackEl = document.getElementById('quiz-feedback');
      feedbackEl.style.display = "none";
      if (currentQuiz < quizData.length) {
        questionEl.innerText = quizData[currentQuiz].q;
      } else {
        document.getElementById('quiz-container').innerHTML = `
          <h3>퀴즈 완료!</h3>
          <p>맞힌 개수: ${correctCount} / ${quizData.length}</p>
          <button onclick="retryQuiz()">다시 풀기</button>
        `;
      }
    }

    let answered = false;

    function answer(userAnswer) {
      if (answered) return;
      answered = true;

      const feedbackEl = document.getElementById('quiz-feedback');
      const correctAnswer = quizData[currentQuiz].answer;
      const numberStr = `${currentQuiz + 1}번째 문제입니다.`;

      if (userAnswer === correctAnswer) {
        feedbackEl.innerText = `정답입니다! ✅`;
        feedbackEl.style.color = "lightgreen";
        correctCount++;
      } else {
        feedbackEl.innerText = `${numberStr}`;
        feedbackEl.style.color = "red";
      }

      feedbackEl.style.display = "block";

      setTimeout(() => {
        answered = false;
        currentQuiz++;
        loadQuiz();
      }, 1500);
    }

    window.retryQuiz = function () {
      currentQuiz = 0;
      correctCount = 0;
      answered = false;

      document.getElementById('quiz-container').innerHTML = `
        <div class="quiz-question" id="quiz-question"></div>
        <div class="quiz-buttons">
          <button onclick="answer('O')">O</button>
          <button onclick="answer('X')">X</button>
        </div>
        <div id="quiz-feedback" style="display:none;"></div>
      `;

      loadQuiz();
    };

    player.on('ended', () => {
      showQuizStartButton();
    });

    // 사용자 정의 버튼
    const tocButton = player.controlBar.addChild('button', { name: 'TocButton' });
    tocButton.addClass('vjs-custom-control');
    tocButton.el().innerHTML = '📖';

    const dropdown = document.createElement('div');
    dropdown.className = 'dropdown-menu';
    for (let i = 1; i <= maxPage; i++) {
      const padded = String(i).padStart(2, '0');
      const item = document.createElement('div');
      const title = config.page_type?.[i]?.title || `${padded}차시`;
      item.innerText = `${title}`;
      item.onclick = () => location.href = `${padded}.html`;
      dropdown.appendChild(item);
    }
    tocButton.el().appendChild(dropdown);
    tocButton.on('click', () => dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block');
    document.addEventListener('click', e => {
      if (!tocButton.el().contains(e.target)) dropdown.style.display = 'none';
    });

    const prevButton = player.controlBar.addChild('button', {
      name: 'PrevButton',
      text: '이전'
    });
    prevButton.addClass('vjs-custom-control');
    prevButton.el().innerHTML = '◀';
    prevButton.on('click', () => {
      if (pageNum > 1) {
        location.href = `${String(pageNum - 1).padStart(2, '0')}.html`;
      } else {
        alert("처음 페이지입니다.");
      }
    });

    const nextButton = player.controlBar.addChild('button', {
      name: 'NextButton',
      text: '다음'
    });
    nextButton.addClass('vjs-custom-control');
    nextButton.el().innerHTML = '▶';
    nextButton.on('click', () => {
      if (pageNum < maxPage) {
        location.href = `${String(pageNum + 1).padStart(2, '0')}.html`;
      } else {
        alert("마지막 페이지입니다.");
      }
    });

    const pageDisplay = player.controlBar.addChild('component');
    pageDisplay.addClass('vjs-custom-control');
    pageDisplay.el().innerText = `${paddedNum}/${String(maxPage).padStart(2, '0')}`;

    const leftWrapper = document.createElement('div');
    leftWrapper.style.display = 'flex';
    leftWrapper.style.alignItems = 'center';
    leftWrapper.className = 'vjs-custom-control';

    const rightWrapper = document.createElement('div');
    rightWrapper.style.display = 'flex';
    rightWrapper.style.alignItems = 'center';
    rightWrapper.style.marginLeft = 'auto';
    rightWrapper.className = 'vjs-custom-control';

    leftWrapper.appendChild(tocButton.el());
    rightWrapper.appendChild(prevButton.el());
    rightWrapper.appendChild(pageDisplay.el());
    rightWrapper.appendChild(nextButton.el());

    player.ready(() => {
      const controlBar = player.controlBar.el();
      controlBar.insertBefore(leftWrapper, controlBar.firstChild);
      controlBar.appendChild(rightWrapper);
    });
  </script>
</body>
</html>
