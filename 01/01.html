<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>차시 강의</title>
  <link href="../common/lib/video-js/video-js.css" rel="stylesheet" />
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    .video-js {
      width: 1024px;
      height: 480px;
    }
    .vjs-control.vjs-custom-control {
      font-size: 14px;
      color: white;
      padding: 0 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2 id="lecture-title">차시 강의</h2>
  <video id="lecture-video" class="video-js vjs-default-skin" controls preload="auto">
    <!-- 동적으로 <source> 추가됨 -->
  </video>

  <script src="../common/lib/video-js/video.min.js"></script>
  <script>
    const videoEl = document.getElementById('lecture-video');
    const currentFile = location.pathname.split('/').pop();  // 예: "01.html"
    const pageNum = parseInt(currentFile.split('.')[0]);
    const maxPage = 8;
    const paddedNum = String(pageNum).padStart(2, '0');

    // 제목 설정
    document.getElementById('lecture-title').innerText = `${paddedNum}차시 강의`;

    // 동영상 경로 설정
    const sourceEl = document.createElement('source');
    sourceEl.src = `../content/01/${paddedNum}.mp4`;
    sourceEl.type = "video/mp4";
    videoEl.appendChild(sourceEl);

    const player = videojs('lecture-video');
    const VjsButton = videojs.getComponent('Button');

    // 이전 버튼
    const prevButton = player.controlBar.addChild('button', {
      text: '이전',
      name: 'PrevButton'
    });
    prevButton.addClass('vjs-custom-control');
    prevButton.el().innerHTML = '◀';
    // 이전 버튼
    prevButton.on('click', () => {
      if (pageNum > 1) {
        const prev = String(pageNum - 1).padStart(2, '0');
        location.href = `${prev}.html`;
      } else {
        alert('처음 페이지입니다');
      }
    });

    // 다음 버튼
    const nextButton = player.controlBar.addChild('button', {
      text: '다음',
      name: 'NextButton'
    });
    nextButton.addClass('vjs-custom-control');
    nextButton.el().innerHTML = '▶';
    nextButton.on('click', () => {
      if (pageNum < maxPage) {
        const next = String(pageNum + 1).padStart(2, '0');
        location.href = `${next}.html`;
      } else {
        alert('마지막 페이지입니다');
      }
    });

    // 현재 페이지 표시
    const pageDisplay = player.controlBar.addChild('component');
    pageDisplay.addClass('vjs-custom-control');
    pageDisplay.el().innerText = `${paddedNum}/${String(maxPage).padStart(2, '0')}`;

    // 스타일 조정 및 버튼 정렬
    const navWrapper = document.createElement('div');
    navWrapper.style.display = 'flex';
    navWrapper.style.alignItems = 'center';
    navWrapper.style.marginLeft = 'auto';
    navWrapper.style.marginRight = '12px';
    navWrapper.className = 'vjs-custom-control';

    prevButton.el().style.margin = '0 6px';
    pageDisplay.el().style.margin = '0 6px';
    nextButton.el().style.margin = '0 6px';

    navWrapper.appendChild(prevButton.el());
    navWrapper.appendChild(pageDisplay.el());
    navWrapper.appendChild(nextButton.el());

    player.ready(() => {
      player.controlBar.el().appendChild(navWrapper);
    });
  </script>
</body>
</html>
